<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي في الفيزياء</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=26">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مساعد الفيزياء">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title-row">
                    <h2>المحادثات السابقة</h2>
                    <button id="close-sidebar-btn" class="close-sidebar-btn">×</button>
                </div>
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    محادثة جديدة
                </button>
            </div>
            <div id="sessions-list" class="sessions-list">
                <!-- المحادثات السابقة ستظهر هنا -->
            </div>
        </aside>

        <div class="chat-container">
        <header class="chat-header">
            <div class="header-left">
                <div class="status-indicator">
                    <span class="dot online"></span>
                    <span>متصل وجاهز</span>
                </div>
            </div>
            <div class="header-center">
                <div class="header-titles">
                    <h1>مساعد معلم الفيزياء الذكي</h1>
                    <span class="subtitle">إهداء لمدرسة ثانوية حداء الأولى</span>
                </div>
            </div>
            <div class="header-right">
                <button id="print-btn" class="icon-btn" title="طباعة">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 9V2H18V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6 18H4C3.46957 18 2.96086 17.7893 2.58579 17.4142C2.21071 17.0391 2 16.5304 2 16V11C2 10.4696 2.21071 9.96086 2.58579 9.58579C2.96086 9.21071 3.46957 9 4 9H20C20.5304 9 21.0391 9.21071 21.4142 9.58579C21.7893 9.96086 22 10.4696 22 11V16C22 16.5304 21.7893 17.0391 21.4142 17.4142C21.0391 17.7893 20.5304 18 20 18H18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M18 14H6V22H18V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="share-group">
                    <button id="share-whatsapp-btn" class="icon-btn whatsapp" title="مشاركة عبر واتساب">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                           <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                    </button>
                    <button id="share-email-btn" class="icon-btn email" title="مشاركة عبر البريد">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 6L12 13L2 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <button id="toggle-sidebar-btn" class="icon-btn" aria-label="تبديل القائمة">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="task-configuration">
            <p class="instruction-text" id="task-instruction">اختر المهمة التي تود إنجازها بناء على المنهج المعتمد</p>
            
            <div class="task-tabs">
                <button class="task-tab active" data-task="chat">مناقشة ودردشة</button>
                <button class="task-tab" data-task="lesson_plan">إعداد خطة درس</button>
                <button class="task-tab" data-task="questions">توليد أسئلة</button>
                <button class="task-tab" data-task="remedial">خطط علاجية وإثرائية</button>
            </div>

            <div class="control-panel" id="task-control-panel" style="display: none;">
                <div class="slider-group">
                    <div class="slider-header">
                        <label>مدة الحصة (بالدقائق):</label>
                        <span id="duration-value">45</span>
                    </div>
                    <input type="range" id="duration-slider" min="15" max="90" value="45" step="5">
                </div>
                <button id="generate-btn" class="primary-btn">توليد خطة الدرس</button>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message assistant">
                <div class="message-bubble">
                    مرحباً! أنا المساعد الذكي في الفيزياء. تفضل، كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <textarea id="user-input" placeholder="اكتب سؤالك هنا حول المستندات..." rows="1"></textarea>
            <button id="send-btn" aria-label="إرسال رسالة">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Adjusted SVG for RTL (flipped horizontally) -->
                    <path d="M2 12H22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M15 5L22 12L15 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        </div>
    </div>
    

    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}?v=26"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered!', reg))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script></script>
</body>
</html>
